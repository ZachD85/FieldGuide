<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Literature & Resource Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        #copilotQueryInput::placeholder { transition: opacity 0.5s ease-in-out; opacity: 1; }
        #copilotQueryInput.placeholder-fade-out::placeholder { opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <header class="bg-[#00205B] text-white px-4 py-3 flex items-center justify-between shadow-md z-30 shrink-0">
        <div class="flex items-center space-x-3">
            <button id="mobileMenuBtn" class="md:hidden text-white hover:text-orange-400 focus:outline-none transition-colors">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div class="flex items-baseline space-x-1 cursor-pointer" onclick="navigateToHome()">
                <span class="text-xl font-bold tracking-tight">Atri<span class="text-[#FF6B00]">Guide</span></span>
                <span class="text-xs text-slate-300 ml-2 hidden sm:inline font-semibold tracking-wider uppercase">FIELD REFERENCE</span>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="navigateToHome()" class="p-1.5 text-slate-300 hover:text-orange-400 transition-colors cursor-pointer" title="Home"><i data-lucide="home" class="w-5 h-5"></i></button>
            <button id="starredQuickBtn" onclick="toggleStarredFilter()" class="relative p-1.5 text-slate-300 hover:text-orange-400 transition-colors cursor-pointer" title="Starred"><i data-lucide="star" class="w-5 h-5"></i></button>
            <button id="adminPortalBtn" class="text-xs font-semibold text-slate-300 hover:text-orange-400 border border-slate-400/30 px-2.5 py-1.5 rounded bg-white/5 cursor-pointer">Admin</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 z-10 hidden md:hidden"></div>
        <aside id="sidebarMenu" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 w-64 bg-white border-r border-slate-200 z-20 flex flex-col justify-between">
            <div class="overflow-y-auto p-4 space-y-4 flex-1">
                <button onclick="navigateToHome()" id="homeGuideBtn" class="w-full flex items-center space-x-2.5 p-3 rounded-lg border border-orange-100 hover:bg-slate-50 font-semibold text-sm transition-all shadow-sm">
                    <i data-lucide="home" class="w-4 h-4 text-orange-500"></i><span>App Home Guide</span>
                </button>
                <div class="text-xs font-bold text-slate-400 tracking-wider uppercase pt-2 mb-1">Resource Hub</div>
                <nav class="space-y-2" id="navCategories">
                    <!-- MAZE -->
                    <div class="border border-slate-100 rounded-lg overflow-hidden bg-slate-50/50">
                        <button class="w-full flex items-center justify-between p-3 font-semibold text-slate-700 hover:bg-slate-100 transition-colors group cursor-pointer" onclick="toggleCategory('mazeMenu')">
                            <div class="flex items-center space-x-2.5"><i data-lucide="activity" class="w-4 h-4 text-slate-500"></i><span>MAZE</span></div>
                            <i data-lucide="chevron-down" id="mazeMenuArrow" class="w-4 h-4 text-slate-400"></i>
                        </button>
                        <div id="mazeMenu" class="hidden bg-white px-2 py-1.5 space-y-0.5">
                            <button onclick="selectSubCategory('MAZE', 'Outcomes and Safety')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="MAZE-Outcomes and Safety">Outcomes and Safety</button>
                            <button onclick="selectSubCategory('MAZE', 'EnCompass Data')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="MAZE-EnCompass Data">EnCompass Data</button>
                            <button onclick="selectSubCategory('MAZE', 'Prophylactic Data')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="MAZE-Prophylactic Data">Prophylactic Data</button>
                        </div>
                    </div>
                    <!-- LAA -->
                    <div class="border border-slate-100 rounded-lg overflow-hidden bg-slate-50/50">
                        <button class="w-full flex items-center justify-between p-3 font-semibold text-slate-700 hover:bg-slate-100 transition-colors group cursor-pointer" onclick="toggleCategory('laaMenu')">
                            <div class="flex items-center space-x-2.5"><i data-lucide="heart" class="w-4 h-4 text-slate-500"></i><span>LAA</span></div>
                            <i data-lucide="chevron-down" id="laaMenuArrow" class="w-4 h-4 text-slate-400"></i>
                        </button>
                        <div id="laaMenu" class="hidden bg-white px-2 py-1.5 space-y-0.5">
                            <button onclick="selectSubCategory('LAA', 'Outcomes and Safety')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="LAA-Outcomes and Safety">Outcomes and Safety</button>
                            <button onclick="selectSubCategory('LAA', 'Stroke Reduction')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="LAA-Stroke Reduction">Stroke Reduction</button>
                            <button onclick="selectSubCategory('LAA', 'Prophylactic Data')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="LAA-Prophylactic Data">Prophylactic Data</button>
                        </div>
                    </div>
                    <!-- DEVICE -->
                    <div class="border border-slate-100 rounded-lg overflow-hidden bg-slate-50/50">
                        <button class="w-full flex items-center justify-between p-3 font-semibold text-slate-700 hover:bg-slate-100 transition-colors group cursor-pointer" onclick="toggleCategory('deviceMenu')">
                            <div class="flex items-center space-x-2.5"><i data-lucide="wrench" class="w-4 h-4 text-slate-500"></i><span>Device Resources</span></div>
                            <i data-lucide="chevron-down" id="deviceMenuArrow" class="w-4 h-4 text-slate-400"></i>
                        </button>
                        <div id="deviceMenu" class="hidden bg-white px-2 py-1.5 space-y-0.5">
                            <button onclick="selectSubCategory('Device Resources', 'IFUs')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="Device Resources-IFUs">IFUs</button>
                            <button onclick="selectSubCategory('Device Resources', 'Product Brochures')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="Device Resources-Product Brochures">Product Brochures</button>
                            <button onclick="selectSubCategory('Device Resources', 'Other Media')" class="w-full text-left px-3 py-2 text-sm rounded font-medium text-slate-600 hover:bg-slate-50 subcat-btn" data-subcat="Device Resources-Other Media">Other Media</button>
                        </div>
                    </div>
                </nav>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto flex flex-col h-full bg-slate-50">
            <div id="contextHeader" class="bg-white border-b border-slate-200 p-4 shrink-0 flex items-center justify-between">
                <span id="breadcrumbMain" class="text-lg font-bold text-[#00205B]">Home</span>
            </div>
            <div class="flex-1 p-6" id="userDashboardView"></div>
            <div id="adminPortalView" class="hidden p-6 space-y-6">
                <!-- Admin contents here (truncated for brevity) -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                     <h3 class="font-bold text-slate-800">Manage System Inventory</h3>
                     <input type="text" id="adminInventorySearch" oninput="filterAdminInventory()" placeholder="Filter..." class="w-full mt-4 p-2 border rounded">
                     <div id="adminInventoryList" class="mt-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const myPrivateFirebaseConfig = {
            apiKey: "AIzaSyDmLx4dkZHzUGjc0BGMmBzUmh9Nm0EbJYg",
            authDomain: "atricure-app.firebaseapp.com",
            projectId: "atricure-app",
            storageBucket: "atricure-app.firebasestorage.app",
            messagingSenderId: "958693322940",
            appId: "1:958693322940:web:a8f8471becb3ded80420b9",
            measurementId: "G-S8Y8SL6MTB"
        };

        const app = initializeApp(myPrivateFirebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'atricure-clinical-hub';
        let clinicalDatabase = [];

        signInAnonymously(auth);

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clinicalResources'), (snapshot) => {
            clinicalDatabase = snapshot.docs.map(doc => normalizeDocument({ id: doc.id, ...doc.data() }));
            renderAppViewboard();
            renderAdminInventory();
        });

        function normalizeDocument(doc) {
            let mCat = String(doc.mainCategory || "").trim();
            let sCat = String(doc.subCategory || "").trim();
            let nMain = "MAZE";
            if (mCat.toLowerCase().includes("laa")) nMain = "LAA";
            else if (mCat.toLowerCase().includes("device")) nMain = "Device Resources";
            else if (mCat.toLowerCase().includes("misc")) nMain = "MISC";
            
            let nSub = sCat;
            if (nMain === "MAZE") {
                if (['Survival Benefits', 'Lesion Durability', 'Procedure Safety'].includes(sCat)) nSub = "Outcomes and Safety";
            } else if (nMain === "LAA") {
                if (['Closure Success Rates', 'Complication Rates', 'Device Safety'].includes(sCat)) nSub = "Outcomes and Safety";
            }
            return { ...doc, mainCategory: nMain, subCategory: nSub };
        }

        function renderAdminInventory() {
            const list = document.getElementById('adminInventoryList');
            list.innerHTML = clinicalDatabase.map(item => `
                <div class="p-3 border-b flex justify-between">
                    <span>${escapeHtml(item.title)}</span>
                    <span class="text-xs text-gray-500">${escapeHtml(item.mainCategory)}: ${escapeHtml(item.subCategory)}</span>
                </div>
            `).join('');
        }

        // --- Helper for escaping strings ---
        function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
        
        // ... (Include your existing navigation/render helpers here) ...
    </script>
</body>
</html>
